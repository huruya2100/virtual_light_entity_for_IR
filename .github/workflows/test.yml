name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint with ruff
        run: uv run ruff check .
        continue-on-error: true
      - name: Run unit tests
        run: uv run pytest tests/ --ignore=tests/integration -v

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Start MQTT broker
        run: |
          docker run -d \
            --name mosquitto \
            -p 1883:1883 \
            -v ${{ github.workspace }}/tests/integration/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2
      - name: Wait for MQTT broker to be ready
        run: |
          for i in $(seq 1 15); do
            if docker exec mosquitto mosquitto_sub -h localhost -t test -C 1 -W 1 2>/dev/null; then
              echo "MQTT broker is ready"
              break
            fi
            echo "Waiting... ($i/15)"
            sleep 1
          done
      - name: Run integration tests
        run: uv run pytest tests/integration -v -m integration
      - name: Stop MQTT broker
        if: always()
        run: docker stop mosquitto && docker rm mosquitto
